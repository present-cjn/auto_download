<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="popup.css">
    <title>插件下载</title>
  </head>
  <body>
    <main>
      <header class="popup-header">
        <h1>订单图片下载</h1>
        <span id="stateBadge">未连接</span>
      </header>
      <section class="config-panel">
        <label for="baseUrl">Web 地址</label>
        <input id="baseUrl" type="url" value="https://dev.waysing.cn">
        <label for="batchId">批次 ID</label>
        <input id="batchId" type="number" min="1" placeholder="例如 12">
      </section>
      <div class="actions">
        <button id="start" type="button">开始</button>
        <button id="pause" type="button">停止</button>
      </div>
      <section class="status-panel">
        <div><span id="state">未连接</span><label>状态</label></div>
        <div><span id="processed">0</span><label>本轮已处理</label></div>
        <div><span id="done">0</span><label>成功</label></div>
        <div><span id="failed">0</span><label>失败</label></div>
      </section>
      <section class="detail-panel">
        <div>
          <label>当前下载 SKU</label>
          <span id="currentSku">当前没有正在下载的 SKU</span>
        </div>
        <div>
          <label>上一次失败原因</label>
          <span id="lastFailure">本轮暂无失败记录</span>
        </div>
      </section>
      <p class="retry-note">失败项请回到 Web 批次页重试，不要点 Chrome 下载栏继续。</p>
      <p id="message"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
