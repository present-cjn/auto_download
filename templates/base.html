<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}订单设计图下载{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">订单设计图下载</a>
      <nav class="nav">
        <a href="/">批次</a>
        {% if current_user and current_user.role == "admin" %}
        <a href="/users">用户</a>
        {% endif %}
        <a class="button primary" href="/uploads/new">上传 Excel</a>
        {% if current_user %}
        <span class="user-chip">{{ current_user.username }} · {{ current_user.role }}</span>
        <form method="post" action="/logout">
          <button class="button subtle" type="submit">退出</button>
        </form>
        {% endif %}
      </nav>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
