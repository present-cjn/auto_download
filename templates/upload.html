{% extends "base.html" %}
{% block title %}上传 Excel{% endblock %}
{% block content %}
<section class="page-header">
  <div>
    <h1>上传订单 Excel</h1>
    <p>当前支持 `.xlsx`。请只保留一个订单工作表；上传后先解析并核对，不会立即下载。</p>
  </div>
</section>

<form class="upload-panel" method="post" action="/uploads" enctype="multipart/form-data">
  <label for="file">选择订单表</label>
  <input id="file" name="file" type="file" accept=".xlsx" required>
  <button class="button primary" type="submit">上传并解析</button>
</form>
{% endblock %}
